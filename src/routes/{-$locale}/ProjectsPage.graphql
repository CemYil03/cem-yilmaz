# Public projects page query — pulls only the workspace-link probe today, so
# the admin "Workspace" button surfaces on `/projects` the same way it does on
# the landing page. The portfolio rows themselves come from the static config
# in `src/web/content/portfolioProjects.ts` until Phase 3 moves them to the DB.
# See `docs/architecture/workspace-access.md` for the `User.admin` contract.
query ProjectsPage {
    currentSession {
        sessionId
        user {
            admin {
                __typename
            }
        }
    }
}
