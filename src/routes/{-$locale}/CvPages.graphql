# Public CV read query тАФ feeds `/cv` (timeline) and `/about` (skill / hobby
# blocks). Experience arrives ordered by `endDate` (ongoing first), then
# `startDate`; the other three lists arrive in `position`-ascending order.
query CvPage {
    currentSession {
        sessionId
        user {
            # Presence-only probe тАФ non-null when the user is an admin. Drives
            # the "Workspace" link in the public-page header. Mirrors the
            # pattern used on the landing page (`HomePage.graphql`). See
            # `docs/architecture/workspace-access.md`.
            admin {
                __typename
            }
        }
    }
    cv {
        experience {
            cvExperienceId
            roleDe
            roleEn
            company
            startDate
            endDate
            descriptionDe
            descriptionEn
            technologies
            managerName
        }
        education {
            cvEducationId
            degreeDe
            degreeEn
            institution
            subjectDe
            subjectEn
            startDate
            endDate
            notesDe
            notesEn
            position
        }
    }
}

query AboutPage {
    currentSession {
        sessionId
        user {
            admin {
                __typename
            }
        }
    }
    cv {
        skills {
            cvSkillId
            category
            label
            position
        }
        hobbies {
            cvHobbyId
            textDe
            textEn
            since
            position
        }
    }
}
