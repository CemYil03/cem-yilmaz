# Operations for the personal-assistant chat at `/workspace/assistant`. Same
# shape as the visitor chat at `/chat` (see `ChatPage.graphql`), but every
# call goes through the `admin` namespace so the server dispatches to
# `agentPersonalAssistant` and persists with `scope = 'admin'`. Every
# operation and fragment is `Workspace*`-prefixed so codegen does not collide
# with the visitor variants in `ChatPage.graphql`. See
# `docs/architecture/multi-agent-chat.md`.

fragment WorkspaceChatMessageGeneration on ChatMessageGeneration {
    modelId
    inputTokens
    outputTokens
    totalTokens
    reasoningTokens
    cachedInputTokens
}

fragment WorkspaceChatMessageFields on ChatMessage {
    __typename
    ... on ChatMessageUser {
        chatMessageId
        body
        createdAt
        author {
            userId
            name
        }
        attachments {
            fileUploadId
            filename
            mediaType
            size
            url
        }
        compassObservations {
            observationId
            category
            content
            confidence
            createdAt
        }
    }
    ... on ChatMessageAssistantText {
        chatMessageId
        body
        createdAt
        generation {
            ...WorkspaceChatMessageGeneration
        }
    }
    ... on ChatMessageToolCall {
        chatMessageId
        toolName
        args
        parentChatMessageId
        createdAt
    }
    ... on ChatMessageToolApprovalRequest {
        chatMessageId
        approvalId
        toolName
        args
        createdAt
        generation {
            ...WorkspaceChatMessageGeneration
        }
    }
    ... on ChatMessageToolApprovalResponse {
        chatMessageId
        approvalId
        approved
        reason
        createdAt
    }
    ... on ChatMessageAssistantInputCollection {
        chatMessageId
        prompt
        mode
        createdAt
        generation {
            ...WorkspaceChatMessageGeneration
        }
        inputs {
            __typename
            ... on ChatAssistantInputDate {
                inputId
                prompt
            }
            ... on ChatAssistantInputDateRange {
                inputId
                prompt
            }
            ... on ChatAssistantInputDateTime {
                inputId
                prompt
            }
            ... on ChatAssistantInputTime {
                inputId
                prompt
            }
            ... on ChatAssistantInputSingleSelect {
                inputId
                prompt
                options
            }
            ... on ChatAssistantInputMultiSelect {
                inputId
                prompt
                options
            }
            ... on ChatAssistantInputBoolean {
                inputId
                prompt
            }
            ... on ChatAssistantInputText {
                inputId
                prompt
            }
            ... on ChatAssistantInputOtp {
                inputId
                prompt
            }
        }
    }
    ... on ChatMessageUserInput {
        chatMessageId
        collectionMessageId
        createdAt
        author {
            userId
            name
        }
        answers {
            inputId
            value {
                __typename
                ... on ChatAssistantInputValueDate {
                    date
                }
                ... on ChatAssistantInputValueDateRange {
                    from
                    to
                }
                ... on ChatAssistantInputValueDateTime {
                    dateTime
                }
                ... on ChatAssistantInputValueTime {
                    time
                }
                ... on ChatAssistantInputValueString {
                    value
                }
                ... on ChatAssistantInputValueStringList {
                    values
                }
                ... on ChatAssistantInputValueBoolean {
                    boolean
                }
            }
        }
    }
}

# Lightweight metadata list — used by the sheet's "recent chats" section
# and by the dedicated route's empty / sidebar surfaces. Returns every
# admin chat newest-first; callers slice the list to ten before rendering
# so the wire shape stays stable when the cap shifts later. The full
# transcript is fetched on demand via `WorkspaceChatPage(chatId)`.
fragment WorkspaceChatListItem on Chat {
    chatId
    title
    lastModifiedAt
}

query WorkspaceAssistantChats {
    currentSession {
        user {
            admin {
                chats {
                    ...WorkspaceChatListItem
                }
            }
        }
    }
}

query WorkspaceChatPage($chatId: ID!) {
    currentSession {
        sessionId
        user {
            userId
            name
            admin {
                chat(chatId: $chatId) {
                    chatId
                    title
                    lastModifiedAt
                    messages {
                        ...WorkspaceChatMessageFields
                    }
                }
            }
        }
    }
}

mutation WorkspaceChatMessageCreate(
    $chatId: ID
    $message: String!
    $fileUploadIds: [ID!]
    $generationId: ID
    $requireToolCallApprovals: Boolean!
    $modelId: String
    $currentPagePath: String
) {
    # `assistantOptions` is built inline so the operation doesn't reference the
    # named `ChatAssistantOptions` input type — referencing it makes
    # `typescript-operations` re-emit `GqlCChatAssistantOptions` and clash with
    # the `typescript` plugin's emission of the same name. See the matching
    # comment in `ChatPage.graphql`.
    admin {
        chatMessageCreate(
            chatId: $chatId
            message: $message
            fileUploadIds: $fileUploadIds
            assistantOptions: { generationId: $generationId, requireToolCallApprovals: $requireToolCallApprovals, modelId: $modelId }
            currentPagePath: $currentPagePath
        ) {
            chatId
            chatMessageId
        }
    }
}

mutation WorkspaceChatInputCollectionRespond(
    $collectionMessageId: ID!
    $answers: [ChatMessageUserInputAnswerCreate!]!
    $generationId: ID
    $requireToolCallApprovals: Boolean!
    $modelId: String
) {
    admin {
        chatInputCollectionRespond(
            collectionMessageId: $collectionMessageId
            answers: $answers
            assistantOptions: { generationId: $generationId, requireToolCallApprovals: $requireToolCallApprovals, modelId: $modelId }
        ) {
            chatId
            chatMessageId
        }
    }
}

mutation WorkspaceChatToolApprovalRespond(
    $approvalId: String!
    $approved: Boolean!
    $reason: String
    $generationId: ID
    $requireToolCallApprovals: Boolean!
    $modelId: String
) {
    admin {
        chatToolApprovalRespond(
            approvalId: $approvalId
            approved: $approved
            reason: $reason
            assistantOptions: { generationId: $generationId, requireToolCallApprovals: $requireToolCallApprovals, modelId: $modelId }
        ) {
            chatId
            chatMessageId
        }
    }
}

# Workspace chat config — `availableModels` is the catalog the composer renders
# in its model dropdown; `defaultModelId` is the admin's saved default and
# what the dropdown initializes to. Fetched alongside the chat list on every
# `/workspace/assistant` route load. See `docs/features/admin-chat-config.md`.
query WorkspaceChatConfig {
    currentSession {
        user {
            admin {
                chatConfig {
                    availableModels {
                        modelId
                        label
                        supportedMediaTypes
                    }
                    defaultModelId
                }
            }
        }
    }
}

# Persists the admin's chosen default chat model. Fired by the composer
# whenever the user picks a different entry from the dropdown — see
# `docs/features/admin-chat-config.md` ("Sticky default").
mutation WorkspaceChatConfigDefaultModelSet($modelId: String!) {
    admin {
        chatConfigDefaultModelSet(modelId: $modelId) {
            success
            referenceId
        }
    }
}
