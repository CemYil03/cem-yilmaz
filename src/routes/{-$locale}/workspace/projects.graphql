# Workspace projects operations — co-located with the `/workspace/projects`
# editor route. Drives the Inbox (`projectRequests`) and the Projects
# board (`projects` + nested `tasks`). Standalone todos live on
# `/workspace/todos` with its own graphql file. The page's read shape lives
# in the `WorkspaceProjectsPageUser` fragment so both the route loader query
# and the live `userUpdates` subscription deliver the exact same payload —
# mutations no longer trigger `router.invalidate()`; the server pushes the
# new state over SSE and the page replaces its `useState` with the
# subscription payload. See `docs/features/projects-workspace.md` and
# `docs/architecture/state-synchronization.md`.

fragment WorkspaceProjectsPageUser on User {
    admin {
        projectRequests {
            projectRequestId
            chatId
            name
            email
            company
            projectType
            description
            budget
            timeline
            status
            verifiedAt
            createdAt
            convertedProject {
                projectId
                title
                status
            }
        }
        projects {
            projectId
            title
            description
            notes
            status
            position
            startedAt
            completedAt
            createdAt
            updatedAt
            totalWorkSec
            sourceRequest {
                projectRequestId
                name
                email
                company
                projectType
            }
            tasks {
                taskId
                projectId
                title
                notes
                status
                position
                dueAt
                completedAt
            }
            activities {
                activityId
                projectId
                taskId
                kind
                channel
                title
                notes
                occurredAt
                startedAt
                endedAt
                durationSec
                createdAt
            }
        }
        activeTimer {
            activityId
            projectId
            taskId
            kind
            title
            occurredAt
            startedAt
            endedAt
            durationSec
        }
    }
}

query WorkspaceProjectsPage {
    currentSession {
        user {
            ...WorkspaceProjectsPageUser
        }
    }
}

subscription WorkspaceProjectsPageUpdates {
    userUpdates {
        ...WorkspaceProjectsPageUser
    }
}

mutation WorkspaceProjectRequestArchive($projectRequestId: ID!) {
    admin {
        projectRequestArchive(projectRequestId: $projectRequestId) {
            success
        }
    }
}

mutation WorkspaceProjectRequestDelete($projectRequestId: ID!) {
    admin {
        projectRequestDelete(projectRequestId: $projectRequestId) {
            success
        }
    }
}

mutation WorkspaceProjectUpsert(
    $projectId: ID
    $title: String!
    $description: String
    $notes: String
    $status: ProjectStatus!
    $position: Int
    $sourceRequestId: ID
    $startedAt: DateTime
    $completedAt: DateTime
) {
    admin {
        projectUpsert(
            input: {
                projectId: $projectId
                title: $title
                description: $description
                notes: $notes
                status: $status
                position: $position
                sourceRequestId: $sourceRequestId
                startedAt: $startedAt
                completedAt: $completedAt
            }
        ) {
            projectId
        }
    }
}

mutation WorkspaceProjectReorder($orderedIds: [ID!]!) {
    admin {
        projectReorder(orderedIds: $orderedIds) {
            success
        }
    }
}

mutation WorkspaceProjectActivityUpsert(
    $activityId: ID
    $projectId: ID!
    $taskId: ID
    $kind: ProjectActivityKind!
    $channel: ProjectActivityChannel
    $title: String!
    $notes: String
    $occurredAt: DateTime!
    $durationSec: Int
) {
    admin {
        projectActivityUpsert(
            input: {
                activityId: $activityId
                projectId: $projectId
                taskId: $taskId
                kind: $kind
                channel: $channel
                title: $title
                notes: $notes
                occurredAt: $occurredAt
                durationSec: $durationSec
            }
        ) {
            activityId
        }
    }
}

mutation WorkspaceProjectActivityDelete($activityId: ID!) {
    admin {
        projectActivityDelete(activityId: $activityId) {
            success
        }
    }
}
