# Workspace projects operations — co-located with the `/workspace/projects`
# editor route. Drives the Inbox (`projectRequests`) and the Projects
# board (`projects` + nested `tasks`). Standalone todos live on
# `/workspace/todos` with its own graphql file. The page's read shape lives
# in the `WorkspaceProjectsPageUser` fragment so both the route loader query
# and the live `userUpdates` subscription deliver the exact same payload —
# mutations no longer trigger `router.invalidate()`; the server pushes the
# new state over SSE and the page replaces its `useState` with the
# subscription payload. See `docs/features/projects-workspace.md` and
# `docs/architecture/state-synchronization.md`.

fragment WorkspaceProjectsPageUser on User {
    admin {
        adminProjectRequestFindMany {
            projectRequestId
            chatId
            name
            email
            company
            projectType
            description
            budget
            timeline
            status
            verifiedAt
            createdAt
            convertedProject {
                projectId
                title
                status
            }
        }
        adminProjectFindMany {
            projectId
            title
            description
            notes
            status
            position
            startedAt
            completedAt
            createdAt
            updatedAt
            totalWorkSec
            sourceRequest {
                projectRequestId
                name
                email
                company
                projectType
            }
            tasks {
                taskId
                projectId
                title
                notes
                status
                position
                dueAt
                completedAt
            }
            activities {
                activityId
                projectId
                taskId
                kind
                channel
                title
                notes
                occurredAt
                startedAt
                endedAt
                durationSec
                createdAt
            }
        }
        adminProjectActiveTimerFindOne {
            activityId
            projectId
            taskId
            kind
            title
            occurredAt
            startedAt
            endedAt
            durationSec
        }
    }
}

query WorkspaceProjectsPage {
    sessionFindOne {
        user {
            ...WorkspaceProjectsPageUser
        }
    }
}

subscription WorkspaceProjectsPageUpdates {
    userUpdates {
        ...WorkspaceProjectsPageUser
    }
}

mutation WorkspaceProjectRequestArchive($projectRequestId: ID!) {
    admin {
        adminProjectRequestArchive(projectRequestId: $projectRequestId) {
            success
        }
    }
}

mutation WorkspaceProjectRequestDelete($projectRequestId: ID!) {
    admin {
        adminProjectRequestDelete(projectRequestId: $projectRequestId) {
            success
        }
    }
}

mutation WorkspaceProjectsUpsert(
    $projectId: ID
    $title: String!
    $description: String
    $notes: String
    $status: AdminProjectStatus!
    $position: Int
    $sourceRequestId: ID
    $startedAt: DateTime
    $completedAt: DateTime
) {
    admin {
        adminProjectsUpsert(
            projects: [
                {
                    projectId: $projectId
                    title: $title
                    description: $description
                    notes: $notes
                    status: $status
                    position: $position
                    sourceRequestId: $sourceRequestId
                    startedAt: $startedAt
                    completedAt: $completedAt
                }
            ]
        ) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceProjectReorder($orderedIds: [ID!]!) {
    admin {
        adminProjectReorder(orderedIds: $orderedIds) {
            success
        }
    }
}

mutation WorkspaceProjectActivitiesUpsert(
    $activityId: ID
    $projectId: ID!
    $taskId: ID
    $kind: AdminProjectActivityKind!
    $channel: AdminProjectActivityChannel
    $title: String!
    $notes: String
    $occurredAt: DateTime!
    $durationSec: Int
) {
    admin {
        adminProjectActivitiesUpsert(
            projectActivities: [
                {
                    activityId: $activityId
                    projectId: $projectId
                    taskId: $taskId
                    kind: $kind
                    channel: $channel
                    title: $title
                    notes: $notes
                    occurredAt: $occurredAt
                    durationSec: $durationSec
                }
            ]
        ) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceProjectActivitiesDelete($activityId: ID!) {
    admin {
        adminProjectActivitiesDelete(activityIds: [$activityId]) {
            success
        }
    }
}
