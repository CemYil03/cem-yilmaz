# Workspace Inventory editor operations. Co-located with `/workspace/inventory`.
# Same seed-and-subscribe posture as `/workspace/media`: the loader query and
# the live `userUpdates` subscription spread `WorkspaceInventoryPageUser` so
# mutations don't need to re-invalidate — every item mutation publishes on
# the user channel and the page picks up the new payload over SSE. See
# `docs/architecture/state-synchronization.md`.

fragment WorkspaceInventoryPageUser on User {
    admin {
        adminInventoryFindOne {
            adminInventoryMaterialNetWorthCentsFindOne
            adminInventoryItemFindMany {
                itemId
                categoryKey
                name
                brand
                model
                serialNumber
                purchasedAt
                purchasePriceCents
                currentValueCents
                condition
                disposalState
                disposedAt
                warrantyEndsAt
                warrantyProvider
                warrantyNotes
                notes
                createdAt
                updatedAt
            }
            adminInventoryItemUpcomingWarrantyFindMany(withinDays: 60) {
                itemId
                name
                brand
                model
                warrantyEndsAt
            }
        }
    }
}

query WorkspaceInventoryPage {
    sessionFindOne {
        user {
            ...WorkspaceInventoryPageUser
        }
    }
}

subscription WorkspaceInventoryPageUpdates {
    userUpdates {
        ...WorkspaceInventoryPageUser
    }
}

mutation WorkspaceItemsUpsert($items: [AdminInventoryItemInput!]!) {
    admin {
        adminInventoryItemsUpsert(items: $items) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceItemsDelete($itemIds: [ID!]!) {
    admin {
        adminInventoryItemsDelete(itemIds: $itemIds) {
            success
        }
    }
}

mutation WorkspaceItemsReprice($inputs: [AdminInventoryItemRepriceInput!]!) {
    admin {
        adminInventoryItemsReprice(inputs: $inputs) {
            success
            referenceIds
        }
    }
}
