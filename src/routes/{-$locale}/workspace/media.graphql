# Workspace Media editor operations. Co-located with `/workspace/media`. Both
# the loader query and the live `userUpdates` subscription spread the same
# `WorkspaceMediaPageUser` fragment so the seed-and-subscribe hook can swap
# state without a shape mismatch — mutations no longer trigger
# `router.invalidate()`; every media mutation publishes on the user channel
# and the page picks up the new payload over SSE. See
# `docs/architecture/state-synchronization.md`.
#
# `adminMediaTmdbFindMany` / `adminMediaTmdbTvFindMany` are intentionally NOT
# part of the page fragment: they're live per-keystroke reads fired only while
# the movies / series tab search box has text. The page uses `useQuery` with
# `pause: !debouncedQuery` and `requestPolicy: 'network-only'` so TMDB
# responses aren't cached.

fragment WorkspaceMediaPageUser on User {
    admin {
        adminMediaFindOne {
            adminMediaMovieFindMany {
                movieId
                title
                tmdbId
                posterUrl
                backdropUrl
                releaseDate
                runtimeMinutes
                overview
                status
                rating
                watchedAt
                notes
                topics
                updatedAt
            }
            adminMediaShowFindMany {
                showId
                title
                tmdbId
                posterUrl
                backdropUrl
                firstAirDate
                overview
                status
                rating
                notes
                topics
                isCompleted
                nextSeasonReleaseDate
                nextSeasonReleaseRough
                updatedAt
            }
            adminMediaChannelFindMany {
                channelId
                name
                platform
                url
                handle
                avatarUrl
                description
                topics
                priority
                notes
                updatedAt
            }
        }
    }
}

query WorkspaceMediaPage {
    sessionFindOne {
        user {
            ...WorkspaceMediaPageUser
        }
    }
}

subscription WorkspaceMediaPageUpdates {
    userUpdates {
        ...WorkspaceMediaPageUser
    }
}

query WorkspaceMediaTmdbSearch($query: String!) {
    sessionFindOne {
        user {
            admin {
                adminMediaFindOne {
                    adminMediaTmdbFindMany(query: $query) {
                        tmdbId
                        title
                        releaseDate
                        posterUrl
                        overview
                    }
                }
            }
        }
    }
}

query WorkspaceMediaTmdbTvSearch($query: String!) {
    sessionFindOne {
        user {
            admin {
                adminMediaFindOne {
                    adminMediaTmdbTvFindMany(query: $query) {
                        tmdbId
                        title
                        firstAirDate
                        posterUrl
                        overview
                    }
                }
            }
        }
    }
}

query WorkspaceMediaYoutubeSearch($query: String!) {
    sessionFindOne {
        user {
            admin {
                adminMediaFindOne {
                    adminMediaYoutubeFindMany(query: $query) {
                        channelId
                        title
                        handle
                        avatarUrl
                        description
                        subscriberCount
                        canonicalUrl
                    }
                }
            }
        }
    }
}

mutation WorkspaceMoviesUpsert($movies: [AdminMediaMovieInput!]!) {
    admin {
        adminMediaMoviesUpsert(movies: $movies) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceMoviesDelete($movieIds: [ID!]!) {
    admin {
        adminMediaMoviesDelete(movieIds: $movieIds) {
            success
        }
    }
}

mutation WorkspaceMoviesAddFromTmdb($inputs: [AdminMediaMovieAddFromTmdbInput!]!) {
    admin {
        adminMediaMoviesAddFromTmdb(inputs: $inputs) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceShowsUpsert($shows: [AdminMediaShowInput!]!) {
    admin {
        adminMediaShowsUpsert(shows: $shows) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceShowsDelete($showIds: [ID!]!) {
    admin {
        adminMediaShowsDelete(showIds: $showIds) {
            success
        }
    }
}

mutation WorkspaceShowsAddFromTmdb($inputs: [AdminMediaShowAddFromTmdbInput!]!) {
    admin {
        adminMediaShowsAddFromTmdb(inputs: $inputs) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceMediaChannelsUpsert($mediaChannels: [AdminMediaChannelInput!]!) {
    admin {
        adminMediaChannelsUpsert(mediaChannels: $mediaChannels) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceMediaChannelsDelete($channelIds: [ID!]!) {
    admin {
        adminMediaChannelsDelete(channelIds: $channelIds) {
            success
        }
    }
}

mutation WorkspaceMediaChannelReorder($orderedIds: [ID!]!) {
    admin {
        adminMediaChannelReorder(orderedIds: $orderedIds) {
            success
        }
    }
}
