# Workspace Travel detail-view operations, co-located with
# `/workspace/travel/$tripId`. The detail loader pulls the singular
# `admin.travel.trip(tripId)` — days pre-joined with activities, packing
# items pre-joined too. Same seed-and-subscribe posture as the list.

fragment WorkspaceTravelDetailUser on User {
    admin {
        adminTravelFindOne {
            adminTravelTripFindOne(tripId: $tripId) {
                tripId
                title
                destination
                startsOn
                endsOn
                status
                transportMode
                accommodation
                notes
                createdAt
                updatedAt
                days {
                    tripDayId
                    tripId
                    dayNumber
                    date
                    title
                    summary
                    activities {
                        tripActivityId
                        tripDayId
                        position
                        startsAt
                        endsAt
                        title
                        location
                        url
                        notes
                    }
                }
                packingItems {
                    tripPackingItemId
                    tripId
                    category
                    label
                    quantity
                    packed
                    position
                    notes
                }
            }
        }
    }
}

query WorkspaceTravelDetail($tripId: ID!) {
    sessionFindOne {
        user {
            ...WorkspaceTravelDetailUser
        }
    }
}

subscription WorkspaceTravelDetailUpdates($tripId: ID!) {
    userUpdates {
        ...WorkspaceTravelDetailUser
    }
}

mutation WorkspaceTripDaysUpsert($tripDays: [AdminTravelTripDayInput!]!) {
    admin {
        adminTravelTripDaysUpsert(tripDays: $tripDays) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceTripDaysDelete($tripDayIds: [ID!]!) {
    admin {
        adminTravelTripDaysDelete(tripDayIds: $tripDayIds) {
            success
        }
    }
}

mutation WorkspaceTripActivitiesUpsert($tripActivities: [AdminTravelTripActivityInput!]!) {
    admin {
        adminTravelTripActivitiesUpsert(tripActivities: $tripActivities) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceTripActivitiesDelete($tripActivityIds: [ID!]!) {
    admin {
        adminTravelTripActivitiesDelete(tripActivityIds: $tripActivityIds) {
            success
        }
    }
}

mutation WorkspaceTripPackingItemsUpsert($tripPackingItems: [AdminTravelTripPackingItemInput!]!) {
    admin {
        adminTravelTripPackingItemsUpsert(tripPackingItems: $tripPackingItems) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceTripPackingItemsDelete($tripPackingItemIds: [ID!]!) {
    admin {
        adminTravelTripPackingItemsDelete(tripPackingItemIds: $tripPackingItemIds) {
            success
        }
    }
}
