# Workspace CV editor operations. Co-located with `/workspace/cv`. The page's
# read shape lives in the `WorkspaceCvPageUser` fragment so both the route
# loader query and the live `userUpdates` subscription deliver the exact same
# payload — mutations no longer trigger `router.invalidate()`; the server
# pushes the new state over SSE and the page replaces its `useState` with the
# subscription payload. See `docs/architecture/state-synchronization.md`.

fragment WorkspaceCvPageUser on User {
    admin {
        adminCvFindOne {
            publicCvExperienceFindMany {
                cvExperienceId
                roleDe
                roleEn
                company
                startDate
                endDate
                descriptionDe
                descriptionEn
                technologies
                managerName
            }
            publicCvEducationFindMany {
                cvEducationId
                degreeDe
                degreeEn
                institution
                subjectDe
                subjectEn
                startDate
                endDate
                notesDe
                notesEn
                position
            }
            publicCvSkillFindMany {
                cvSkillId
                category
                label
                position
            }
            publicCvHobbyFindMany {
                cvHobbyId
                textDe
                textEn
                since
                position
            }
        }
    }
}

query WorkspaceCvPage {
    sessionFindOne {
        user {
            ...WorkspaceCvPageUser
        }
    }
}

subscription WorkspaceCvPageUpdates {
    userUpdates {
        ...WorkspaceCvPageUser
    }
}

mutation WorkspaceCvExperienceUpsert(
    $cvExperienceId: ID
    $roleDe: String!
    $roleEn: String!
    $company: String!
    $startDate: Date!
    $endDate: Date
    $descriptionDe: String!
    $descriptionEn: String!
    $technologies: [String!]!
    $managerName: String
) {
    admin {
        cvExperienceUpsert(
            input: {
                cvExperienceId: $cvExperienceId
                roleDe: $roleDe
                roleEn: $roleEn
                company: $company
                startDate: $startDate
                endDate: $endDate
                descriptionDe: $descriptionDe
                descriptionEn: $descriptionEn
                technologies: $technologies
                managerName: $managerName
            }
        ) {
            cvExperienceId
        }
    }
}

mutation WorkspaceCvExperienceDelete($cvExperienceId: ID!) {
    admin {
        cvExperienceDelete(cvExperienceId: $cvExperienceId) {
            success
        }
    }
}

mutation WorkspaceCvEducationUpsert(
    $cvEducationId: ID
    $degreeDe: String!
    $degreeEn: String!
    $institution: String!
    $subjectDe: String!
    $subjectEn: String!
    $startDate: Date
    $endDate: Date!
    $notesDe: String!
    $notesEn: String!
    $position: Int!
) {
    admin {
        cvEducationUpsert(
            input: {
                cvEducationId: $cvEducationId
                degreeDe: $degreeDe
                degreeEn: $degreeEn
                institution: $institution
                subjectDe: $subjectDe
                subjectEn: $subjectEn
                startDate: $startDate
                endDate: $endDate
                notesDe: $notesDe
                notesEn: $notesEn
                position: $position
            }
        ) {
            cvEducationId
        }
    }
}

mutation WorkspaceCvEducationDelete($cvEducationId: ID!) {
    admin {
        cvEducationDelete(cvEducationId: $cvEducationId) {
            success
        }
    }
}

mutation WorkspaceCvSkillUpsert($cvSkillId: ID, $category: CvSkillCategory!, $label: String!, $position: Int!) {
    admin {
        cvSkillUpsert(input: { cvSkillId: $cvSkillId, category: $category, label: $label, position: $position }) {
            cvSkillId
        }
    }
}

mutation WorkspaceCvSkillDelete($cvSkillId: ID!) {
    admin {
        cvSkillDelete(cvSkillId: $cvSkillId) {
            success
        }
    }
}

mutation WorkspaceCvHobbyUpsert($cvHobbyId: ID, $textDe: String!, $textEn: String!, $since: Int, $position: Int!) {
    admin {
        cvHobbyUpsert(input: { cvHobbyId: $cvHobbyId, textDe: $textDe, textEn: $textEn, since: $since, position: $position }) {
            cvHobbyId
        }
    }
}

mutation WorkspaceCvHobbyDelete($cvHobbyId: ID!) {
    admin {
        cvHobbyDelete(cvHobbyId: $cvHobbyId) {
            success
        }
    }
}

mutation WorkspaceCvEducationReorder($orderedIds: [ID!]!) {
    admin {
        cvEducationReorder(orderedIds: $orderedIds) {
            success
        }
    }
}

mutation WorkspaceCvSkillReorder($orderedIds: [ID!]!) {
    admin {
        cvSkillReorder(orderedIds: $orderedIds) {
            success
        }
    }
}

mutation WorkspaceCvHobbyReorder($orderedIds: [ID!]!) {
    admin {
        cvHobbyReorder(orderedIds: $orderedIds) {
            success
        }
    }
}
