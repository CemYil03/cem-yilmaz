# Workspace CV editor operations. Co-located with `/workspace/cv`. The page's
# read shape lives in the `WorkspaceCvPageUser` fragment so both the route
# loader query and the live `userUpdates` subscription deliver the exact same
# payload — mutations no longer trigger `router.invalidate()`; the server
# pushes the new state over SSE and the page replaces its `useState` with the
# subscription payload. See `docs/architecture/state-synchronization.md`.

fragment WorkspaceCvPageUser on User {
    admin {
        adminCvFindOne {
            publicCvExperienceFindMany {
                cvExperienceId
                roleDe
                roleEn
                company
                startDate
                endDate
                descriptionDe
                descriptionEn
                technologies
                managerName
            }
            publicCvEducationFindMany {
                cvEducationId
                degreeDe
                degreeEn
                institution
                subjectDe
                subjectEn
                startDate
                endDate
                notesDe
                notesEn
                position
            }
            publicCvSkillFindMany {
                cvSkillId
                category
                label
                position
            }
            publicCvHobbyFindMany {
                cvHobbyId
                textDe
                textEn
                since
                position
            }
        }
    }
}

query WorkspaceCvPage {
    sessionFindOne {
        user {
            ...WorkspaceCvPageUser
        }
    }
}

subscription WorkspaceCvPageUpdates {
    userUpdates {
        ...WorkspaceCvPageUser
    }
}

mutation WorkspaceCvExperiencesUpsert($cvExperiences: [CvExperienceInput!]!) {
    admin {
        cvExperiencesUpsert(cvExperiences: $cvExperiences) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceCvExperiencesDelete($cvExperienceIds: [ID!]!) {
    admin {
        cvExperiencesDelete(cvExperienceIds: $cvExperienceIds) {
            success
        }
    }
}

mutation WorkspaceCvEducationsUpsert($cvEducations: [CvEducationInput!]!) {
    admin {
        cvEducationsUpsert(cvEducations: $cvEducations) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceCvEducationsDelete($cvEducationIds: [ID!]!) {
    admin {
        cvEducationsDelete(cvEducationIds: $cvEducationIds) {
            success
        }
    }
}

mutation WorkspaceCvSkillsUpsert($cvSkills: [CvSkillInput!]!) {
    admin {
        cvSkillsUpsert(cvSkills: $cvSkills) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceCvSkillsDelete($cvSkillIds: [ID!]!) {
    admin {
        cvSkillsDelete(cvSkillIds: $cvSkillIds) {
            success
        }
    }
}

mutation WorkspaceCvHobbiesUpsert($cvHobbies: [CvHobbyInput!]!) {
    admin {
        cvHobbiesUpsert(cvHobbies: $cvHobbies) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceCvHobbiesDelete($cvHobbyIds: [ID!]!) {
    admin {
        cvHobbiesDelete(cvHobbyIds: $cvHobbyIds) {
            success
        }
    }
}

mutation WorkspaceCvEducationReorder($orderedIds: [ID!]!) {
    admin {
        cvEducationReorder(orderedIds: $orderedIds) {
            success
        }
    }
}

mutation WorkspaceCvSkillReorder($orderedIds: [ID!]!) {
    admin {
        cvSkillReorder(orderedIds: $orderedIds) {
            success
        }
    }
}

mutation WorkspaceCvHobbyReorder($orderedIds: [ID!]!) {
    admin {
        cvHobbyReorder(orderedIds: $orderedIds) {
            success
        }
    }
}
