# Workspace Fitness editor operations. Co-located with `/workspace/fitness`.
# Same seed-and-subscribe posture as `/workspace/travel`: the loader query and
# the live `userUpdates` subscription spread `WorkspaceFitnessPageUser` so
# mutations don't need to re-invalidate — every fitness mutation publishes on
# the user channel and the page picks up the new payload over SSE. See
# `docs/features/workspace-fitness.md`.

fragment WorkspaceFitnessExercise on AdminFitnessExercise {
    exerciseId
    name
    muscleGroup
    equipment
    notes
}

fragment WorkspaceFitnessPageUser on User {
    admin {
        adminFitnessFindOne {
            adminFitnessExerciseFindMany {
                ...WorkspaceFitnessExercise
            }
            adminFitnessRoutineFindMany {
                routineId
                name
                notes
                position
                items {
                    routineItemId
                    routineId
                    position
                    targetSets
                    targetReps
                    targetWeight
                    notes
                    exercise {
                        ...WorkspaceFitnessExercise
                    }
                }
            }
            adminFitnessSessionFindMany {
                sessionId
                date
                title
                routineId
                durationMinutes
                notes
                sets {
                    setId
                    sessionId
                    position
                    weight
                    reps
                    rpe
                    isWarmup
                    notes
                    exercise {
                        ...WorkspaceFitnessExercise
                    }
                }
            }
        }
    }
}

query WorkspaceFitnessPage {
    sessionFindOne {
        user {
            ...WorkspaceFitnessPageUser
        }
    }
}

subscription WorkspaceFitnessPageUpdates {
    userUpdates {
        ...WorkspaceFitnessPageUser
    }
}

mutation WorkspaceExercisesUpsert($exercises: [AdminFitnessExerciseInput!]!) {
    admin {
        adminFitnessExercisesUpsert(exercises: $exercises) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceExercisesDelete($exerciseIds: [ID!]!) {
    admin {
        adminFitnessExercisesDelete(exerciseIds: $exerciseIds) {
            success
        }
    }
}

mutation WorkspaceWorkoutRoutinesUpsert($workoutRoutines: [AdminFitnessWorkoutRoutineInput!]!) {
    admin {
        adminFitnessWorkoutRoutinesUpsert(workoutRoutines: $workoutRoutines) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceWorkoutRoutinesDelete($routineIds: [ID!]!) {
    admin {
        adminFitnessWorkoutRoutinesDelete(routineIds: $routineIds) {
            success
        }
    }
}

mutation WorkspaceWorkoutRoutineItemsUpsert($workoutRoutineItems: [AdminFitnessWorkoutRoutineItemInput!]!) {
    admin {
        adminFitnessWorkoutRoutineItemsUpsert(workoutRoutineItems: $workoutRoutineItems) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceWorkoutRoutineItemsDelete($routineItemIds: [ID!]!) {
    admin {
        adminFitnessWorkoutRoutineItemsDelete(routineItemIds: $routineItemIds) {
            success
        }
    }
}

mutation WorkspaceWorkoutSessionsUpsert($workoutSessions: [AdminFitnessWorkoutSessionInput!]!) {
    admin {
        adminFitnessWorkoutSessionsUpsert(workoutSessions: $workoutSessions) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceWorkoutSessionsDelete($sessionIds: [ID!]!) {
    admin {
        adminFitnessWorkoutSessionsDelete(sessionIds: $sessionIds) {
            success
        }
    }
}

mutation WorkspaceWorkoutSetsUpsert($workoutSets: [AdminFitnessWorkoutSetInput!]!) {
    admin {
        adminFitnessWorkoutSetsUpsert(workoutSets: $workoutSets) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceWorkoutSetsDelete($setIds: [ID!]!) {
    admin {
        adminFitnessWorkoutSetsDelete(setIds: $setIds) {
            success
        }
    }
}
