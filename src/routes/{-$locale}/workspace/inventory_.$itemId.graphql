# Workspace Inventory detail-view operations, co-located with
# `/workspace/inventory/$itemId`. The detail loader pulls the singular
# `admin.inventory.item(itemId)` — which includes valuations, service
# entries, and files. Same seed-and-subscribe posture as the list.

fragment WorkspaceInventoryDetailUser on User {
    admin {
        adminInventoryFindOne {
            adminInventoryItemFindOne(itemId: $itemId) {
                itemId
                categoryKey
                name
                brand
                model
                serialNumber
                purchasedAt
                purchasePriceCents
                currentValueCents
                condition
                disposalState
                disposedAt
                warrantyEndsAt
                warrantyProvider
                warrantyNotes
                notes
                createdAt
                updatedAt
                valuations {
                    valuationId
                    valueCents
                    valuedAt
                    note
                }
                serviceEntries {
                    serviceEntryId
                    kind
                    performedAt
                    vendor
                    costCents
                    notes
                    nextDueAt
                    files {
                        itemFileId
                        kind
                        label
                        pinned
                        fileUpload {
                            fileUploadId
                            filename
                            mediaType
                            size
                            url
                        }
                    }
                }
                files {
                    itemFileId
                    itemId
                    serviceEntryId
                    kind
                    label
                    pinned
                    fileUpload {
                        fileUploadId
                        filename
                        mediaType
                        size
                        url
                    }
                }
            }
        }
    }
}

query WorkspaceInventoryDetail($itemId: ID!) {
    sessionFindOne {
        user {
            ...WorkspaceInventoryDetailUser
        }
    }
}

subscription WorkspaceInventoryDetailUpdates($itemId: ID!) {
    userUpdates {
        ...WorkspaceInventoryDetailUser
    }
}

mutation WorkspaceItemServiceEntriesUpsert($itemServiceEntries: [AdminInventoryItemServiceEntryInput!]!) {
    admin {
        adminInventoryItemServiceEntriesUpsert(itemServiceEntries: $itemServiceEntries) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceItemServiceEntriesDelete($serviceEntryIds: [ID!]!) {
    admin {
        adminInventoryItemServiceEntriesDelete(serviceEntryIds: $serviceEntryIds) {
            success
        }
    }
}

mutation WorkspaceItemFilesAttach($inputs: [AdminInventoryItemFileAttachInput!]!) {
    admin {
        adminInventoryItemFilesAttach(inputs: $inputs) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceItemFilesDelete($itemFileIds: [ID!]!) {
    admin {
        adminInventoryItemFilesDelete(itemFileIds: $itemFileIds) {
            success
        }
    }
}

mutation WorkspaceItemFilesUpsert($itemFiles: [AdminInventoryItemFileUpsert!]!) {
    admin {
        adminInventoryItemFilesUpsert(itemFiles: $itemFiles) {
            success
            referenceIds
        }
    }
}
