# Workspace project detail page operations. Co-located with
# `/workspace/projects/$projectId`. The page's read shape lives in the
# `WorkspaceProjectDetailUser` fragment so both the route loader query and
# the live `userUpdates` subscription deliver the exact same payload —
# mutations no longer trigger `router.invalidate()`; the server pushes the
# new state over SSE and the page replaces its `useState` with the
# subscription payload. See `docs/architecture/state-synchronization.md`.

fragment WorkspaceProjectDetailUser on User {
    admin {
        adminProjectActiveTimerFindOne {
            activityId
            projectId
            taskId
            kind
            title
            occurredAt
            startedAt
            endedAt
            durationSec
        }
        adminProjectFindOne(projectId: $projectId) {
            projectId
            title
            description
            notes
            status
            position
            startedAt
            completedAt
            createdAt
            updatedAt
            totalWorkSec
            sourceRequest {
                projectRequestId
                name
                email
                company
                projectType
                description
                budget
                timeline
            }
            tasks {
                taskId
                projectId
                title
                notes
                status
                position
                dueAt
                completedAt
                effort
                whenBucket
            }
            activities {
                activityId
                projectId
                taskId
                kind
                channel
                direction
                title
                notes
                occurredAt
                startedAt
                endedAt
                durationSec
                amountCents
                offerStatus
                createdAt
                links {
                    projectLinkId
                    url
                    label
                    kind
                    pinned
                }
                files {
                    projectFileId
                    label
                    kind
                    pinned
                    fileUpload {
                        fileUploadId
                        filename
                        mediaType
                        size
                        url
                    }
                }
            }
            links {
                projectLinkId
                projectId
                activityId
                url
                label
                kind
                pinned
                createdAt
                updatedAt
            }
            files {
                projectFileId
                projectId
                activityId
                label
                kind
                pinned
                createdAt
                updatedAt
                fileUpload {
                    fileUploadId
                    filename
                    mediaType
                    size
                    url
                }
            }
        }
    }
}

query WorkspaceProjectDetail($projectId: ID!) {
    sessionFindOne {
        user {
            ...WorkspaceProjectDetailUser
        }
    }
}

subscription WorkspaceProjectDetailUpdates($projectId: ID!) {
    userUpdates {
        ...WorkspaceProjectDetailUser
    }
}

mutation WorkspaceProjectDetailUpsertProject(
    $projectId: ID
    $title: String!
    $description: String
    $notes: String
    $status: ProjectStatus!
    $position: Int
    $startedAt: DateTime
    $completedAt: DateTime
) {
    admin {
        projectsUpsert(
            projects: [
                {
                    projectId: $projectId
                    title: $title
                    description: $description
                    notes: $notes
                    status: $status
                    position: $position
                    sourceRequestId: null
                    startedAt: $startedAt
                    completedAt: $completedAt
                }
            ]
        ) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceProjectDetailDeleteProject($projectId: ID!) {
    admin {
        projectsDelete(projectIds: [$projectId]) {
            success
        }
    }
}

mutation WorkspaceProjectDetailUpsertTask(
    $taskId: ID
    $projectId: ID
    $title: String!
    $notes: String
    $status: TaskStatus!
    $position: Int!
    $dueAt: DateTime
    $completedAt: DateTime
    $effort: TaskEffort
    $whenBucket: TaskWhenBucket
) {
    admin {
        tasksUpsert(
            tasks: [
                {
                    taskId: $taskId
                    projectId: $projectId
                    title: $title
                    notes: $notes
                    status: $status
                    position: $position
                    dueAt: $dueAt
                    completedAt: $completedAt
                    effort: $effort
                    whenBucket: $whenBucket
                }
            ]
        ) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceProjectDetailDeleteTask($taskId: ID!) {
    admin {
        tasksDelete(taskIds: [$taskId]) {
            success
        }
    }
}

mutation WorkspaceProjectDetailUpsertActivity(
    $activityId: ID
    $projectId: ID!
    $taskId: ID
    $kind: ProjectActivityKind!
    $channel: ProjectActivityChannel
    $direction: ProjectActivityDirection
    $title: String!
    $notes: String
    $occurredAt: DateTime!
    $durationSec: Int
    $amountCents: Int
    $offerStatus: ProjectOfferStatus
    $attachLinkUrl: String
    $attachLinkKind: ProjectLinkKind
    $attachLinkLabel: String
    $attachLinkPinned: Boolean
    $attachFileUploadId: ID
    $attachFileKind: ProjectFileKind
    $attachFileLabel: String
    $attachFilePinned: Boolean
) {
    admin {
        projectActivitiesUpsert(
            projectActivities: [
                {
                    activityId: $activityId
                    projectId: $projectId
                    taskId: $taskId
                    kind: $kind
                    channel: $channel
                    direction: $direction
                    title: $title
                    notes: $notes
                    occurredAt: $occurredAt
                    durationSec: $durationSec
                    amountCents: $amountCents
                    offerStatus: $offerStatus
                    attachLinkUrl: $attachLinkUrl
                    attachLinkKind: $attachLinkKind
                    attachLinkLabel: $attachLinkLabel
                    attachLinkPinned: $attachLinkPinned
                    attachFileUploadId: $attachFileUploadId
                    attachFileKind: $attachFileKind
                    attachFileLabel: $attachFileLabel
                    attachFilePinned: $attachFilePinned
                }
            ]
        ) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceProjectDetailDeleteActivity($activityId: ID!) {
    admin {
        projectActivitiesDelete(activityIds: [$activityId]) {
            success
        }
    }
}

mutation WorkspaceProjectDetailTimerStart($projectId: ID!, $taskId: ID, $title: String) {
    admin {
        projectTimersStart(inputs: [{ projectId: $projectId, taskId: $taskId, title: $title }]) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceProjectDetailTimerStop($activityId: ID!) {
    admin {
        projectTimersStop(activityIds: [$activityId]) {
            success
        }
    }
}

mutation WorkspaceProjectLinkUpsert(
    $projectLinkId: ID
    $projectId: ID!
    $activityId: ID
    $url: String!
    $label: String
    $kind: ProjectLinkKind!
    $pinned: Boolean
) {
    admin {
        projectLinksUpsert(
            projectLinks: [
                {
                    projectLinkId: $projectLinkId
                    projectId: $projectId
                    activityId: $activityId
                    url: $url
                    label: $label
                    kind: $kind
                    pinned: $pinned
                }
            ]
        ) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceProjectLinkDelete($projectLinkId: ID!) {
    admin {
        projectLinksDelete(projectLinkIds: [$projectLinkId]) {
            success
        }
    }
}

mutation WorkspaceProjectFileUpsert(
    $projectFileId: ID
    $projectId: ID!
    $activityId: ID
    $fileUploadId: ID!
    $label: String
    $kind: ProjectFileKind!
    $pinned: Boolean
) {
    admin {
        projectFilesUpsert(
            projectFiles: [
                {
                    projectFileId: $projectFileId
                    projectId: $projectId
                    activityId: $activityId
                    fileUploadId: $fileUploadId
                    label: $label
                    kind: $kind
                    pinned: $pinned
                }
            ]
        ) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceProjectFileDelete($projectFileId: ID!) {
    admin {
        projectFilesDelete(projectFileIds: [$projectFileId]) {
            success
        }
    }
}
