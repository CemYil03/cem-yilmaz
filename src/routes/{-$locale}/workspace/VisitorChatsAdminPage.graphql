# Admin review of visitor chats — rendered at `/workspace/visitor-chats`.
# Reads cross-session through the `user.admin.publicChats` / `publicChat`
# namespace (gated by the `User.admin` resolver, which returns null for
# non-admin sessions). The transcript view reuses the
# `WorkspaceChatMessageFields` fragment from `WorkspaceAssistantPage.graphql`
# so we don't fork the per-variant rendering shape. See
# `docs/features/chat-visitor.md`.

query WorkspaceVisitorChats {
    currentSession {
        sessionId
        user {
            admin {
                publicChats {
                    chatId
                    title
                    lastModifiedAt
                }
            }
        }
    }
}

query WorkspaceVisitorChat($chatId: ID!) {
    currentSession {
        sessionId
        user {
            admin {
                publicChat(chatId: $chatId) {
                    chatId
                    title
                    lastModifiedAt
                    messages {
                        ...WorkspaceChatMessageFields
                    }
                }
            }
        }
    }
}
