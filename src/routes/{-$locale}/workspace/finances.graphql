# Workspace Finances editor operations. Co-located with `/workspace/finances`.
# Seed-and-subscribe posture: the loader query and the live `userUpdates`
# subscription spread `WorkspaceFinancesPageUser`, so every mutation publishes
# on the user channel and the page picks up the new payload over SSE without a
# re-fetch. See `docs/architecture/state-synchronization.md` and
# `docs/features/workspace-finances.md`.

fragment WorkspaceFinancesPageUser on User {
    admin {
        adminFinancesFindOne {
            adminFinancesMonthlyIncomeCentsFindOne
            adminFinancesQuarterlyIncomeCentsFindOne
            adminFinancesYearlyIncomeCentsFindOne
            adminFinancesMonthlyExpensesCentsFindOne
            adminFinancesQuarterlyExpensesCentsFindOne
            adminFinancesYearlyExpensesCentsFindOne
            adminFinancesLiquidCentsFindOne
            adminFinancesInvestedCentsFindOne
            adminFinancesBausparCentsFindOne
            adminFinancesFinancialNetWorthCentsFindOne
            adminFinancesIncomeStreamFindMany {
                incomeStreamId
                name
                amountCents
                cadence
                currency
                notes
                active
                startsOn
                endsOn
                createdAt
                updatedAt
            }
            adminFinancesRecurringCostFindMany {
                costId
                name
                categoryKey
                amountCents
                cadence
                currency
                notes
                active
                startsOn
                endsOn
                createdAt
                updatedAt
            }
            adminFinancesAssetFindMany {
                assetId
                kind
                name
                location
                currentValueCents
                shares
                symbol
                isin
                currency
                notes
                active
                createdAt
                updatedAt
            }
        }
        adminInventoryFindOne {
            adminInventoryMaterialNetWorthCentsFindOne
        }
    }
}

query WorkspaceFinancesPage {
    sessionFindOne {
        user {
            ...WorkspaceFinancesPageUser
        }
    }
}

subscription WorkspaceFinancesPageUpdates {
    userUpdates {
        ...WorkspaceFinancesPageUser
    }
}

mutation WorkspaceFinancesRecurringCostsUpsert($financeRecurringCosts: [AdminFinancesRecurringCostInput!]!) {
    admin {
        adminFinancesRecurringCostsUpsert(financeRecurringCosts: $financeRecurringCosts) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceFinancesRecurringCostsDelete($costIds: [ID!]!) {
    admin {
        adminFinancesRecurringCostsDelete(costIds: $costIds) {
            success
        }
    }
}

mutation WorkspaceFinancesIncomeStreamsUpsert($financeIncomeStreams: [AdminFinancesIncomeStreamInput!]!) {
    admin {
        adminFinancesIncomeStreamsUpsert(financeIncomeStreams: $financeIncomeStreams) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceFinancesIncomeStreamsDelete($incomeStreamIds: [ID!]!) {
    admin {
        adminFinancesIncomeStreamsDelete(incomeStreamIds: $incomeStreamIds) {
            success
        }
    }
}

mutation WorkspaceFinancesAssetsUpsert($financeAssets: [AdminFinancesAssetInput!]!) {
    admin {
        adminFinancesAssetsUpsert(financeAssets: $financeAssets) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceFinancesAssetsDelete($assetIds: [ID!]!) {
    admin {
        adminFinancesAssetsDelete(assetIds: $assetIds) {
            success
        }
    }
}

mutation WorkspaceFinancesAssetsReprice($inputs: [AdminFinancesAssetRepriceInput!]!) {
    admin {
        adminFinancesAssetsReprice(inputs: $inputs) {
            success
            referenceIds
        }
    }
}
