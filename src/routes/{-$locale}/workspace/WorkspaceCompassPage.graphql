# Operations for the workspace compass page (`/workspace/compass`).
# Co-located with `/workspace/compass`. The page's read shape lives in the
# `WorkspaceCompassPageUser` fragment so both the route loader query and the
# live `userUpdates` subscription deliver the exact same payload — mutations
# no longer trigger `router.invalidate()`; the synthesis job publishes
# `userUpdates` on completion and the page replaces its `useState` with the
# subscription payload. See `docs/architecture/state-synchronization.md`.
#
# See `docs/features/compass.md`.

fragment WorkspaceCompassObservation on CompassObservation {
    observationId
    category
    content
    confidence
    sourceChatId
    sourceChatMessageId
    sourceInterviewId
    sourceInterviewMessageId
    analyzerModelId
    dismissedAt
    createdAt
}

fragment WorkspaceCompassInterviewMessage on CompassInterviewMessage {
    interviewMessageId
    role
    content
    createdAt
}

fragment WorkspaceCompassInterviewSummary on CompassInterview {
    interviewId
    status
    dueAt
    startedAt
    completedAt
    endReason
    triggerReason
    observationCount
}

fragment WorkspaceCompassInterviewWithMessages on CompassInterview {
    ...WorkspaceCompassInterviewSummary
    messages {
        ...WorkspaceCompassInterviewMessage
    }
}

fragment WorkspaceCompassPageUser on User {
    admin {
        compass {
            summary
            prose
            psychology
            synthesizedAt
            synthesisModelId
            observationsSinceSynthesis
            synthesisInProgress
            observations(category: $category, includeDismissed: $includeDismissed) {
                ...WorkspaceCompassObservation
            }
            interviewPending {
                ...WorkspaceCompassInterviewWithMessages
            }
            interviews {
                ...WorkspaceCompassInterviewSummary
            }
        }
    }
}

query WorkspaceCompassPage($category: CompassObservationCategory, $includeDismissed: Boolean) {
    currentSession {
        user {
            ...WorkspaceCompassPageUser
        }
    }
}

subscription WorkspaceCompassPageUpdates($category: CompassObservationCategory, $includeDismissed: Boolean) {
    userUpdates {
        ...WorkspaceCompassPageUser
    }
}

query WorkspaceCompassInterview($interviewId: ID!) {
    currentSession {
        user {
            admin {
                compass {
                    interview(interviewId: $interviewId) {
                        ...WorkspaceCompassInterviewWithMessages
                    }
                }
            }
        }
    }
}

mutation WorkspaceCompassObservationDismiss($observationId: ID!) {
    admin {
        compassObservationDismiss(observationId: $observationId) {
            success
        }
    }
}

mutation WorkspaceCompassSynthesizeRequest {
    admin {
        compassSynthesizeRequest {
            success
            referenceId
        }
    }
}

mutation WorkspaceCompassInterviewStart($interviewId: ID!) {
    admin {
        compassInterviewStart(interviewId: $interviewId) {
            success
            referenceId
        }
    }
}

mutation WorkspaceCompassInterviewMessageSend($interviewId: ID!, $content: String!) {
    admin {
        compassInterviewMessageSend(interviewId: $interviewId, content: $content) {
            success
            referenceId
        }
    }
}

mutation WorkspaceCompassInterviewEnd($interviewId: ID!) {
    admin {
        compassInterviewEnd(interviewId: $interviewId) {
            success
        }
    }
}

mutation WorkspaceCompassInterviewSkip($interviewId: ID!) {
    admin {
        compassInterviewSkip(interviewId: $interviewId) {
            success
        }
    }
}
