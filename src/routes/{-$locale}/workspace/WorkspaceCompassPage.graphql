# Operations for the workspace compass page (`/workspace/compass`).
#
# `WorkspaceCompassPage` is the main read query — three text artifacts, plus
# the observations list filtered by category. The list refetches when the
# category filter changes because URQL's policy plays it safe with arg-change
# misses; the synthesized text artifacts never change with category so they
# are loaded once and cached.
#
# See `docs/features/compass.md`.

fragment WorkspaceCompassObservation on CompassObservation {
    observationId
    category
    content
    confidence
    sourceChatId
    sourceChatMessageId
    analyzerModelId
    dismissedAt
    createdAt
}

query WorkspaceCompassPage($category: CompassObservationCategory, $includeDismissed: Boolean) {
    currentSession {
        user {
            admin {
                compass {
                    summary
                    prose
                    psychology
                    synthesizedAt
                    synthesisModelId
                    observationsSinceSynthesis
                    synthesisInProgress
                    observations(category: $category, includeDismissed: $includeDismissed) {
                        ...WorkspaceCompassObservation
                    }
                }
            }
        }
    }
}

mutation WorkspaceCompassObservationDismiss($observationId: ID!) {
    admin {
        compassObservationDismiss(observationId: $observationId) {
            success
        }
    }
}

mutation WorkspaceCompassSynthesizeRequest {
    admin {
        compassSynthesizeRequest {
            success
            referenceId
        }
    }
}
