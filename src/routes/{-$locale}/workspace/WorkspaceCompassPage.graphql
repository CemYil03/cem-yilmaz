# Operations for the workspace compass page (`/workspace/compass`).
# Co-located with `/workspace/compass`. The page's read shape lives in the
# `WorkspaceCompassPageUser` fragment so both the route loader query and the
# live `userUpdates` subscription deliver the exact same payload â€” mutations
# no longer trigger `router.invalidate()`; the synthesis job publishes
# `userUpdates` on completion and the page replaces its `useState` with the
# subscription payload. See `docs/architecture/state-synchronization.md`.
#
# See `docs/features/compass.md`.

fragment WorkspaceCompassObservation on CompassObservation {
    observationId
    category
    content
    confidence
    sourceChatId
    sourceChatMessageId
    sourceInterviewId
    sourceInterviewMessageId
    analyzerModelId
    dismissedAt
    createdAt
}

fragment WorkspaceCompassInterviewMessage on CompassInterviewMessage {
    interviewMessageId
    role
    content
    createdAt
}

fragment WorkspaceCompassInterviewSummary on CompassInterview {
    interviewId
    status
    dueAt
    startedAt
    completedAt
    endReason
    triggerReason
    topic
    observationCount
}

fragment WorkspaceCompassInterviewWithMessages on CompassInterview {
    ...WorkspaceCompassInterviewSummary
    messages {
        ...WorkspaceCompassInterviewMessage
    }
}

fragment WorkspaceCompassPageUser on User {
    admin {
        adminCompassFindOne {
            summary
            prose
            psychology
            synthesizedAt
            synthesisModelId
            observationsSinceSynthesis
            synthesisInProgress
            adminCompassObservationFindMany(category: $category, includeDismissed: $includeDismissed) {
                ...WorkspaceCompassObservation
            }
            adminCompassInterviewPendingFindOne {
                ...WorkspaceCompassInterviewWithMessages
            }
            scheduledInterviewTopic
            scheduledInterviewAt
            scheduledInterviewReason
            adminCompassInterviewFindMany {
                ...WorkspaceCompassInterviewSummary
            }
        }
    }
}

query WorkspaceCompassPage($category: CompassObservationCategory, $includeDismissed: Boolean) {
    sessionFindOne {
        user {
            ...WorkspaceCompassPageUser
        }
    }
}

subscription WorkspaceCompassPageUpdates($category: CompassObservationCategory, $includeDismissed: Boolean) {
    userUpdates {
        ...WorkspaceCompassPageUser
    }
}

query WorkspaceCompassInterview($interviewId: ID!) {
    sessionFindOne {
        user {
            admin {
                adminCompassFindOne {
                    adminCompassInterviewFindOne(interviewId: $interviewId) {
                        ...WorkspaceCompassInterviewWithMessages
                    }
                }
            }
        }
    }
}

mutation WorkspaceCompassObservationDismiss($observationId: ID!) {
    admin {
        compassObservationDismiss(observationId: $observationId) {
            success
        }
    }
}

mutation WorkspaceCompassSynthesizeRequest {
    admin {
        compassSynthesizeRequest {
            success
            referenceId
        }
    }
}

mutation WorkspaceCompassInterviewStart($interviewId: ID!, $generationId: ID) {
    admin {
        compassInterviewStart(interviewId: $interviewId, generationId: $generationId) {
            success
            referenceId
        }
    }
}

mutation WorkspaceCompassInterviewMessageSend($interviewId: ID!, $content: String!, $generationId: ID) {
    admin {
        compassInterviewMessageSend(interviewId: $interviewId, content: $content, generationId: $generationId) {
            success
            referenceId
        }
    }
}

mutation WorkspaceCompassInterviewEnd($interviewId: ID!) {
    admin {
        compassInterviewEnd(interviewId: $interviewId) {
            success
        }
    }
}

mutation WorkspaceCompassInterviewSkip($interviewId: ID!) {
    admin {
        compassInterviewSkip(interviewId: $interviewId) {
            success
        }
    }
}

mutation WorkspaceCompassInterviewStartNow($topic: CompassInterviewTopic) {
    admin {
        compassInterviewStartNow(topic: $topic) {
            success
            referenceId
        }
    }
}

mutation WorkspaceCompassScheduledInterviewDismiss {
    admin {
        compassScheduledInterviewDismiss {
            success
        }
    }
}

# Per-turn subscription for the compass interview transcript. Delivers
# streamed assistant-text deltas (keyed by the pre-allocated
# `interviewMessageId`), newly-persisted rows on both sides of the turn,
# and a terminal `turnEnded` when the detached agent run finishes. The
# `WorkspaceCompassInterviewMessage` fragment is shared with the loader
# query so a streaming-preview â†’ persisted-row swap has the exact same
# shape on both sides.
subscription WorkspaceCompassInterviewUpdates($generationId: ID!) {
    compassInterviewUpdates(generationId: $generationId) {
        __typename
        ... on CompassInterviewUpdateMessageAppended {
            message {
                ...WorkspaceCompassInterviewMessage
            }
        }
        ... on CompassInterviewUpdateAssistantTextChunk {
            interviewMessageId
            delta
        }
        ... on CompassInterviewUpdateTurnEnded {
            generationId
            concluded
        }
    }
}
