# Workspace Nutrition editor operations. Co-located with `/workspace/nutrition`.
# Same seed-and-subscribe posture as `/workspace/travel`: the loader query and
# the live `userUpdates` subscription spread `WorkspaceNutritionPageUser` so
# mutations don't need to re-invalidate — every nutrition mutation publishes on
# the user channel and the page picks up the new payload over SSE. Meal-plan
# and diary lists return everything; the page slices to the visible week
# client-side. See `docs/features/workspace-nutrition.md`.

fragment WorkspaceNutritionRecipe on AdminNutritionRecipe {
    recipeId
    title
    mealType
    ingredients
    steps
    tags
    isFavorite
    rating
    prepTimeMinutes
    servings
    sourceUrl
    notes
    lastMadeAt
}

fragment WorkspaceNutritionSupplement on AdminNutritionSupplement {
    supplementId
    name
    brand
    servingSize
    servingsPerContainer
    sourceUrl
    notes
    researchedAt
    nutrients {
        nutrientId
        name
        amount
        unit
        percentDailyValue
        sortOrder
    }
}

fragment WorkspaceNutritionPageUser on User {
    admin {
        adminNutritionFindOne {
            adminNutritionRecipeFindMany {
                ...WorkspaceNutritionRecipe
            }
            adminNutritionMealPlanFindMany {
                entryId
                date
                mealType
                customText
                notes
                recipe {
                    recipeId
                    title
                    mealType
                }
            }
            adminNutritionFoodLogFindMany {
                logId
                consumedAt
                mealType
                kind
                description
                notes
                recipe {
                    recipeId
                    title
                }
            }
            adminNutritionSupplementFindMany {
                ...WorkspaceNutritionSupplement
            }
        }
    }
}

query WorkspaceNutritionPage {
    sessionFindOne {
        user {
            ...WorkspaceNutritionPageUser
        }
    }
}

subscription WorkspaceNutritionPageUpdates {
    userUpdates {
        ...WorkspaceNutritionPageUser
    }
}

mutation WorkspaceRecipesUpsert($recipes: [AdminNutritionRecipeInput!]!) {
    admin {
        adminNutritionRecipesUpsert(recipes: $recipes) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceRecipesDelete($recipeIds: [ID!]!) {
    admin {
        adminNutritionRecipesDelete(recipeIds: $recipeIds) {
            success
        }
    }
}

mutation WorkspaceMealPlanEntriesUpsert($mealPlanEntries: [AdminNutritionMealPlanEntryInput!]!) {
    admin {
        adminNutritionMealPlanEntriesUpsert(mealPlanEntries: $mealPlanEntries) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceMealPlanEntriesDelete($entryIds: [ID!]!) {
    admin {
        adminNutritionMealPlanEntriesDelete(entryIds: $entryIds) {
            success
        }
    }
}

mutation WorkspaceFoodLogEntriesUpsert($foodLogEntries: [AdminNutritionFoodLogEntryInput!]!) {
    admin {
        adminNutritionFoodLogEntriesUpsert(foodLogEntries: $foodLogEntries) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceFoodLogEntriesDelete($logIds: [ID!]!) {
    admin {
        adminNutritionFoodLogEntriesDelete(logIds: $logIds) {
            success
        }
    }
}

mutation WorkspaceSupplementsUpsert($supplements: [AdminNutritionSupplementInput!]!) {
    admin {
        adminNutritionSupplementsUpsert(supplements: $supplements) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceSupplementNutrientsReplace($supplementId: ID!, $nutrients: [AdminNutritionSupplementNutrientInput!]!) {
    admin {
        adminNutritionSupplementNutrientsReplace(supplementId: $supplementId, nutrients: $nutrients) {
            success
        }
    }
}

mutation WorkspaceSupplementsDelete($supplementIds: [ID!]!) {
    admin {
        adminNutritionSupplementsDelete(supplementIds: $supplementIds) {
            success
        }
    }
}

mutation WorkspaceSupplementResearch($input: AdminNutritionSupplementResearchInput!) {
    admin {
        adminNutritionSupplementResearch(input: $input) {
            found
            brand
            servingSize
            servingsPerContainer
            sourceUrl
            notes
            summary
            nutrients {
                name
                amount
                unit
                percentDailyValue
            }
        }
    }
}
