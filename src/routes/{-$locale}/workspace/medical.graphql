# Workspace Medical editor operations. Co-located with `/workspace/medical`.
# Both the loader query and the live `userUpdates` subscription spread the
# same `WorkspaceMedicalPageUser` fragment so the seed-and-subscribe hook
# can swap state without a shape mismatch — mutations no longer trigger
# `router.invalidate()`; every medical mutation publishes on the user
# channel and the page picks up the new payload over SSE. See
# `docs/architecture/state-synchronization.md`.

fragment WorkspaceMedicalPageAppointment on AdminMedicalAppointment {
    appointmentId
    category
    providerName
    title
    notes
    scheduledAt
    completedAt
    nextDueAt
    status
    topics
    createdAt
    updatedAt
}

fragment WorkspaceMedicalPageRecordFile on AdminMedicalRecordFile {
    recordFileId
    recordId
    label
    pinned
    createdAt
    updatedAt
    fileUpload {
        fileUploadId
        filename
        mediaType
        size
        url
    }
}

fragment WorkspaceMedicalPageRecord on AdminMedicalRecord {
    recordId
    category
    title
    summary
    severity
    symptoms
    bodyAreas
    occurredAt
    resolvedAt
    appointmentId
    topics
    createdAt
    updatedAt
    files {
        ...WorkspaceMedicalPageRecordFile
    }
}

fragment WorkspaceMedicalPageUser on User {
    admin {
        adminMedicalFindOne {
            adminMedicalAppointmentFindMany {
                ...WorkspaceMedicalPageAppointment
            }
            adminMedicalRecordFindMany {
                ...WorkspaceMedicalPageRecord
            }
            adminMedicalCategoryOverviewFindMany {
                category
                defaultCadenceMonths
                lastCompletedAt
                nextDueAt
                isOverdue
                upcoming {
                    ...WorkspaceMedicalPageAppointment
                }
                recentRecords {
                    ...WorkspaceMedicalPageRecord
                }
            }
        }
    }
}

query WorkspaceMedicalPage {
    sessionFindOne {
        user {
            ...WorkspaceMedicalPageUser
        }
    }
}

subscription WorkspaceMedicalPageUpdates {
    userUpdates {
        ...WorkspaceMedicalPageUser
    }
}

mutation WorkspaceMedicalAppointmentsUpsert($medicalAppointments: [AdminMedicalAppointmentInput!]!) {
    admin {
        adminMedicalAppointmentsUpsert(medicalAppointments: $medicalAppointments) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceMedicalAppointmentsDelete($appointmentIds: [ID!]!) {
    admin {
        adminMedicalAppointmentsDelete(appointmentIds: $appointmentIds) {
            success
        }
    }
}

mutation WorkspaceMedicalRecordsUpsert($medicalRecords: [AdminMedicalRecordInput!]!) {
    admin {
        adminMedicalRecordsUpsert(medicalRecords: $medicalRecords) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceMedicalRecordsDelete($recordIds: [ID!]!) {
    admin {
        adminMedicalRecordsDelete(recordIds: $recordIds) {
            success
        }
    }
}

mutation WorkspaceMedicalRecordFilesAttach($inputs: [AdminMedicalRecordFileAttachInput!]!) {
    admin {
        adminMedicalRecordFilesAttach(inputs: $inputs) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceMedicalRecordFilesDelete($recordFileIds: [ID!]!) {
    admin {
        adminMedicalRecordFilesDelete(recordFileIds: $recordFileIds) {
            success
        }
    }
}
