# Workspace todos operations — co-located with the `/workspace/todos`
# editor route. Reads and writes standalone tasks (rows with
# `projectId IS NULL`). Project-bound tasks live on the project detail
# route and its own graphql file; the two surfaces stay disjoint so
# neither has to filter the other out. See
# `docs/features/todos.md` and
# `docs/architecture/state-synchronization.md`.

fragment WorkspaceTodosPageUser on User {
    admin {
        adminStandaloneTaskFindMany {
            taskId
            projectId
            title
            notes
            status
            position
            dueAt
            completedAt
            effort
            whenBucket
        }
    }
}

query WorkspaceTodosPage {
    sessionFindOne {
        user {
            ...WorkspaceTodosPageUser
        }
    }
}

subscription WorkspaceTodosPageUpdates {
    userUpdates {
        ...WorkspaceTodosPageUser
    }
}

mutation WorkspaceTodoUpsert(
    $taskId: ID
    $title: String!
    $notes: String
    $status: TaskStatus!
    $position: Int!
    $dueAt: DateTime
    $completedAt: DateTime
    $effort: TaskEffort
    $whenBucket: TaskWhenBucket
) {
    admin {
        tasksUpsert(
            tasks: [
                {
                    taskId: $taskId
                    projectId: null
                    title: $title
                    notes: $notes
                    status: $status
                    position: $position
                    dueAt: $dueAt
                    completedAt: $completedAt
                    effort: $effort
                    whenBucket: $whenBucket
                }
            ]
        ) {
            success
            referenceIds
        }
    }
}

mutation WorkspaceTodoDelete($taskId: ID!) {
    admin {
        tasksDelete(taskIds: [$taskId]) {
            success
        }
    }
}
