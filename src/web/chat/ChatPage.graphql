# Operations for the minimal AI chat surface — see `docs/features/chat.md`.
# The fragment is the single source of truth for which fields the
# `<ChatMessage />` component needs; matches the union shape in
# `docs/architecture/chat.md`.

fragment ChatMessageGeneration on ChatMessageGeneration {
    modelId
    inputTokens
    outputTokens
    totalTokens
    reasoningTokens
    cachedInputTokens
}

fragment ChatMessageFields on ChatMessage {
    __typename
    ... on ChatMessageUser {
        chatMessageId
        body
        createdAt
        author {
            userId
            name
        }
        attachments {
            fileUploadId
            filename
            mediaType
            size
            url
        }
        profileObservations {
            observationId
            category
            content
            confidence
            createdAt
        }
    }
    ... on ChatMessageAssistantText {
        chatMessageId
        body
        createdAt
        generation {
            ...ChatMessageGeneration
        }
    }
    ... on ChatMessageToolCall {
        chatMessageId
        toolName
        args
        parentChatMessageId
        createdAt
    }
    ... on ChatMessageToolApprovalRequest {
        chatMessageId
        approvalId
        toolName
        args
        createdAt
        generation {
            ...ChatMessageGeneration
        }
    }
    ... on ChatMessageToolApprovalResponse {
        chatMessageId
        approvalId
        approved
        reason
        createdAt
    }
    ... on ChatMessageAssistantInputCollection {
        chatMessageId
        prompt
        mode
        createdAt
        generation {
            ...ChatMessageGeneration
        }
        inputs {
            __typename
            ... on ChatAssistantInputDate {
                inputId
                prompt
            }
            ... on ChatAssistantInputDateRange {
                inputId
                prompt
            }
            ... on ChatAssistantInputDateTime {
                inputId
                prompt
            }
            ... on ChatAssistantInputTime {
                inputId
                prompt
            }
            ... on ChatAssistantInputSingleSelect {
                inputId
                prompt
                options
            }
            ... on ChatAssistantInputMultiSelect {
                inputId
                prompt
                options
            }
            ... on ChatAssistantInputBoolean {
                inputId
                prompt
            }
            ... on ChatAssistantInputText {
                inputId
                prompt
            }
            ... on ChatAssistantInputOtp {
                inputId
                prompt
            }
        }
    }
    ... on ChatMessageUserInput {
        chatMessageId
        collectionMessageId
        createdAt
        author {
            userId
            name
        }
        answers {
            inputId
            value {
                __typename
                ... on ChatAssistantInputValueDate {
                    date
                }
                ... on ChatAssistantInputValueDateRange {
                    from
                    to
                }
                ... on ChatAssistantInputValueDateTime {
                    dateTime
                }
                ... on ChatAssistantInputValueTime {
                    time
                }
                ... on ChatAssistantInputValueString {
                    value
                }
                ... on ChatAssistantInputValueStringList {
                    values
                }
                ... on ChatAssistantInputValueBoolean {
                    boolean
                }
            }
        }
    }
}

query ChatPage($chatId: ID!) {
    currentSession {
        sessionId
        user {
            userId
            name
        }
    }
    chat(chatId: $chatId) {
        chatId
        title
        lastModifiedAt
        messages {
            ...ChatMessageFields
        }
    }
}

mutation ChatMessageCreate(
    $chatId: ID
    $message: String!
    $fileUploadIds: [ID!]
    $generationId: ID
    $requireToolCallApprovals: Boolean!
    $currentPagePath: String
) {
    # `assistantOptions` is built inline so the operation doesn't reference the
    # named `ChatAssistantOptions` input type — referencing it makes
    # `typescript-operations` re-emit `GqlCChatAssistantOptions` and clash with
    # the `typescript` plugin's emission of the same name.
    chatMessageCreate(
        chatId: $chatId
        message: $message
        fileUploadIds: $fileUploadIds
        assistantOptions: { generationId: $generationId, requireToolCallApprovals: $requireToolCallApprovals }
        currentPagePath: $currentPagePath
    ) {
        chatId
        chatMessageId
    }
}

# `ChatInputCollectionRespond` lives here alongside the other operations.
# A custom codegen split (schema types in `schemaTypes.ts`, operations in
# `generated.ts` with `namespacedImportName: 'Schema'`) keeps the operations
# plugin from re-emitting the named input type referenced by `$answers` —
# see `docs/architecture/client-codegen-output-split.md`.

mutation ChatInputCollectionRespond(
    $collectionMessageId: ID!
    $answers: [ChatMessageUserInputAnswerCreate!]!
    $generationId: ID
    $requireToolCallApprovals: Boolean!
) {
    chatInputCollectionRespond(
        collectionMessageId: $collectionMessageId
        answers: $answers
        assistantOptions: { generationId: $generationId, requireToolCallApprovals: $requireToolCallApprovals }
    ) {
        chatId
        chatMessageId
    }
}

mutation ChatToolApprovalRespond(
    $approvalId: String!
    $approved: Boolean!
    $reason: String
    $generationId: ID
    $requireToolCallApprovals: Boolean!
) {
    chatToolApprovalRespond(
        approvalId: $approvalId
        approved: $approved
        reason: $reason
        assistantOptions: { generationId: $generationId, requireToolCallApprovals: $requireToolCallApprovals }
    ) {
        chatId
        chatMessageId
    }
}

subscription ChatUpdates($generationId: ID!) {
    chatUpdates(generationId: $generationId) {
        __typename
        ... on ChatUpdateMessageAppended {
            message {
                ...ChatMessageFields
            }
        }
        ... on ChatUpdateAssistantTextChunk {
            chatMessageId
            delta
        }
        ... on ChatUpdateTurnEnded {
            generationId
        }
    }
}

# --- Visitor dialog empty state ---------------------------------------------
#
# `VisitorPreviousChats` powers the "Frühere Chats / Previous chats" list
# rendered in the chat dialog's empty state, and the rate-limit row below
# the composer. Refetch on every open (`requestPolicy: 'cache-and-network'`)
# and after every successful send so the quota readout reflects the latest
# state. See `docs/features/chat-visitor.md`.

fragment VisitorChatListItem on Chat {
    chatId
    title
    lastModifiedAt
}

fragment VisitorChatQuotaFields on VisitorChatQuota {
    used
    limit
    resetsAt
}

query VisitorPreviousChats {
    currentSession {
        sessionId
        visitorChats {
            ...VisitorChatListItem
        }
        visitorChatQuota {
            ...VisitorChatQuotaFields
        }
    }
}

# Quota-only query for `<VisitorChatComposer />`. The composer renders the
# daily allowance below the textarea on every visitor surface, so it needs
# the quota independent of the chats list (the loaded view does not show
# previous chats). `cache-and-network` on the consumer side keeps the line
# fresh across remounts without forcing a refetch on every keystroke.
query VisitorChatQuota {
    currentSession {
        sessionId
        visitorChatQuota {
            ...VisitorChatQuotaFields
        }
    }
}
